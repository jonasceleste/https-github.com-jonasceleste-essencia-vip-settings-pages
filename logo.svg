<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Gradiente dourado principal -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bf953f"/>
      <stop offset="25%" stop-color="#fcf6ba"/>
      <stop offset="50%" stop-color="#b38728"/>
      <stop offset="75%" stop-color="#fbf5b7"/>
      <stop offset="100%" stop-color="#aa771c"/>
    </linearGradient>

    <!-- Gradiente dourado mais escuro para sombras -->
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8a6e2f"/>
    </linearGradient>

    <!-- Gradiente radial para brilho -->
    <radialGradient id="sparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8dc" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow dourado -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo transparente (para uso no site dark) -->

  <!-- ========== FRASCO DE PERFUME (esquerda) ========== -->
  <g transform="translate(65, 60) scale(0.9)">
    <!-- Tampa/base do borrifador -->
    <rect x="62" y="0" width="26" height="35" rx="3" fill="url(#goldGrad)"/>
    <rect x="65" y="2" width="20" height="10" rx="2" fill="#fcf6ba" opacity="0.6"/>

    <!-- Mangueira/bico curvado -->
    <path d="M 75 35 Q 75 60, 110 65 Q 135 70, 140 55" fill="none" stroke="url(#goldGrad)" stroke-width="7" stroke-linecap="round"/>
    <path d="M 75 35 Q 75 60, 110 65 Q 135 70, 140 55" fill="none" stroke="#fff8dc" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

    <!-- Bola do borrifador -->
    <circle cx="140" cy="55" r="14" fill="url(#goldGrad)"/>
    <circle cx="135" cy="50" r="5" fill="#fff8dc" opacity="0.7"/>

    <!-- Corpo do frasco -->
    <path d="M 25 35 L 125 35 L 118 160 L 32 160 Z" fill="url(#goldGrad)"/>
    <!-- Sombra lateral do frasco -->
    <path d="M 90 35 L 125 35 L 118 160 L 90 160 Z" fill="#8a6e2f" opacity="0.35"/>
    <!-- Brilho lateral -->
    <path d="M 25 35 L 45 35 L 38 160 L 32 160 Z" fill="#fff8dc" opacity="0.25"/>

    <!-- Facetagem do frasco (linhas verticais) -->
    <line x1="50" y1="35" x2="46" y2="160" stroke="#8a6e2f" stroke-width="1.2" opacity="0.5"/>
    <line x1="75" y1="35" x2="73" y2="160" stroke="#8a6e2f" stroke-width="1.2" opacity="0.5"/>
    <line x1="100" y1="35" x2="99" y2="160" stroke="#8a6e2f" stroke-width="1.2" opacity="0.5"/>

    <!-- Gargalo do frasco -->
    <rect x="55" y="20" width="40" height="15" rx="2" fill="url(#goldDark)"/>
    <rect x="58" y="22" width="10" height="10" rx="1" fill="#fff8dc" opacity="0.4"/>

    <!-- Partículas/disperção saindo do borrifador -->
    <g filter="url(#glow)">
      <circle cx="160" cy="45" r="2.5" fill="#ffd700"/>
      <circle cx="175" cy="35" r="1.8" fill="#fff8dc"/>
      <circle cx="185" cy="50" r="2" fill="#ffd700"/>
      <circle cx="170" cy="60" r="1.5" fill="#fff8dc"/>
      <circle cx="195" cy="40" r="1.2" fill="#ffd700"/>
      <circle cx="155" cy="30" r="1.5" fill="#fff8dc"/>
      <circle cx="180" cy="65" r="1" fill="#ffd700"/>
      <circle cx="200" cy="55" r="1.8" fill="#fff8dc"/>
      <circle cx="165" cy="75" r="1.3" fill="#ffd700"/>
      <circle cx="190" cy="25" r="1" fill="#fff8dc"/>
      <circle cx="210" cy="45" r="1.5" fill="#ffd700"/>
      <circle cx="145" cy="55" r="1" fill="#fff8dc"/>
    </g>

    <!-- Espiral de partículas -->
    <path d="M 150 35 Q 170 20, 190 30 T 210 50" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.7"/>
    <path d="M 160 60 Q 180 75, 200 65 T 220 45" fill="none" stroke="url(#goldGrad)" stroke-width="0.6" stroke-dasharray="2 5" opacity="0.5"/>
  </g>

  <!-- ========== FLOR DE LÓTUS (topo central) ========== -->
  <g transform="translate(400, 55)">
    <!-- Pétalas de trás -->
    <path d="M 0 -25 Q -35 -45, -45 -10 Q -20 -5, 0 -10 Q 20 -5, 45 -10 Q 35 -45, 0 -25" fill="url(#goldDark)"/>
    <!-- Pétalas do meio -->
    <path d="M 0 -15 Q -25 -40, -30 -5 Q -15 0, 0 -5 Q 15 0, 30 -5 Q 25 -40, 0 -15" fill="url(#goldGrad)"/>
    <!-- Pétalas centrais -->
    <path d="M 0 -8 Q -15 -30, -18 -2 Q -8 2, 0 0 Q 8 2, 18 -2 Q 15 -30, 0 -8" fill="#fcf6ba"/>
    <!-- Brilho central -->
    <circle cx="0" cy="-12" r="6" fill="url(#sparkle)"/>
    <circle cx="-3" cy="-15" r="2" fill="#fff" opacity="0.9"/>
  </g>

  <!-- ========== ORNAMENTOS/ARABESCOS ========== -->
  <g transform="translate(400, 95)" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round">
    <!-- Arabesco superior -->
    <path d="M -220 0 Q -180 -15, -140 0 T -60 0 Q -30 -8, 0 -5 Q 30 -8, 60 0 T 140 0 Q 180 -15, 220 0" />
    <path d="M -200 -5 Q -170 -20, -130 -8 T -50 -5" stroke-width="1.5" opacity="0.6"/>
    <path d="M 200 -5 Q 170 -20, 130 -8 T 50 -5" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Arabesco inferior -->
    <path d="M -200 85 Q -160 100, -120 88 T -40 90 Q -10 95, 0 92 Q 10 95, 40 90 T 120 88 Q 160 100, 200 85" />
    <path d="M -180 90 Q -150 105, -110 95 T -30 95" stroke-width="1.5" opacity="0.6"/>
    <path d="M 180 90 Q 150 105, 110 95 T 30 95" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- ========== TEXTO ESSÊNCIA ========== -->
  <g transform="translate(400, 168)">
    <text x="0" y="0" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', Georgia, serif" font-size="72" font-weight="700" letter-spacing="6" fill="url(#goldGrad)" filter="url(#glow)">ESSÊNCIA</text>
    <!-- Sombra sutil -->
    <text x="2" y="2" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', Georgia, serif" font-size="72" font-weight="700" letter-spacing="6" fill="#5c4010" opacity="0.35">ESSÊNCIA</text>
    <!-- Camada principal -->
    <text x="0" y="0" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', Georgia, serif" font-size="72" font-weight="700" letter-spacing="6" fill="url(#goldGrad)">ESSÊNCIA</text>
    <!-- Brilho superior -->
    <text x="-1" y="-1" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', Georgia, serif" font-size="72" font-weight="700" letter-spacing="6" fill="#fff8dc" opacity="0.4">ESSÊNCIA</text>
  </g>

  <!-- ========== TEXTO VIP ========== -->
  <g transform="translate(400, 245)">
    <text x="0" y="0" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', Georgia, serif" font-size="56" font-weight="700" letter-spacing="14" fill="url(#goldGrad)" filter="url(#glow)">VIP</text>
    <!-- Sombra -->
    <text x="2" y="2" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', Georgia, serif" font-size="56" font-weight="700" letter-spacing="14" fill="#5c4010" opacity="0.35">VIP</text>
    <!-- Principal -->
    <text x="0" y="0" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', Georgia, serif" font-size="56" font-weight="700" letter-spacing="14" fill="url(#goldGrad)">VIP</text>
    <!-- Brilho -->
    <text x="-1" y="-1" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', Georgia, serif" font-size="56" font-weight="700" letter-spacing="14" fill="#fff8dc" opacity="0.4">VIP</text>
  </g>

  <!-- ========== BRILHOS/ESTRELAS DECORATIVAS ========== -->
  <g filter="url(#glow)">
    <!-- Estrelas acima do lótus -->
    <path d="M 400 15 L 402 22 L 409 24 L 402 26 L 400 33 L 398 26 L 391 24 L 398 22 Z" fill="#fff8dc"/>
    <path d="M 360 35 L 361 38 L 364 39 L 361 40 L 360 43 L 359 40 L 356 39 L 359 38 Z" fill="#ffd700" opacity="0.8"/>
    <path d="M 440 30 L 441 33 L 444 34 L 441 35 L 440 38 L 439 35 L 436 34 L 439 33 Z" fill="#ffd700" opacity="0.8"/>
    <circle cx="320" cy="50" r="2" fill="#fff8dc" opacity="0.9"/>
    <circle cx="480" cy="45" r="2.5" fill="#ffd700" opacity="0.85"/>
    <circle cx="340" cy="25" r="1.5" fill="#fff8dc" opacity="0.7"/>
    <circle cx="460" cy="55" r="1.8" fill="#ffd700" opacity="0.75"/>
    <circle cx="380" cy="10" r="1.2" fill="#fff8dc" opacity="0.8"/>
    <circle cx="420" cy="18" r="1.5" fill="#ffd700" opacity="0.9"/>
  </g>

  <!-- Ornamentos laterais finos -->
  <g fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5">
    <path d="M 260 165 Q 240 180, 230 170 T 210 175" />
    <path d="M 540 165 Q 560 180, 570 170 T 590 175" />
  </g>
</svg>